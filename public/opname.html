<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Stock Opname</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="assets/style.css" />
</head>
<body class="min-h-screen bg-slate-950 text-slate-100">
  <div class="flex min-h-screen">
    <aside class="w-72 bg-slate-900 p-6 flex flex-col gap-6">
      <div>
        <h2 class="text-2xl font-semibold">Yare Cafe</h2>
        <p class="text-slate-400 mt-1">Stock Opname</p>
      </div>
      <nav class="space-y-3 text-slate-300">
        <a href="/dashboard" data-page="dashboard" class="block px-4 py-3 rounded-2xl hover:bg-slate-800">Dashboard</a>
        <a href="/menu" data-page="menu" class="block px-4 py-3 rounded-2xl hover:bg-slate-800">Menu</a>
        <a href="/transaksi" data-page="transaksi" class="block px-4 py-3 rounded-2xl hover:bg-slate-800">Transaksi</a>
        <a href="/gudang" data-page="gudang" class="block px-4 py-3 rounded-2xl hover:bg-slate-800">Gudang</a>
        <a href="/opname" data-page="opname" class="block px-4 py-3 rounded-2xl bg-slate-800">Stock Opname</a>
      </nav>
      <button id="logoutBtn" class="mt-auto px-4 py-3 rounded-2xl bg-red-500 hover:bg-red-400 text-slate-950 font-semibold">Logout</button>
    </aside>
    <main class="flex-1 p-8 space-y-8">
      <header>
        <h1 class="text-4xl font-semibold">Stock Opname</h1>
        <p class="text-slate-400">Bandingkan stok fisik dengan sistem.</p>
      </header>
      <div class="view-toggle">
        <button id="opnameListView" data-view="list" class="active" type="button">List</button>
        <button id="opnameGridView" data-view="grid" type="button">Grid</button>
      </div>
      <section class="grid grid-cols-1 lg:grid-cols-2 gap-6">
        <div class="rounded-3xl bg-slate-900 p-6 shadow-xl border border-slate-700">
          <h2 class="text-2xl font-semibold mb-4">Input Stok Fisik</h2>
          <div class="space-y-4">
            <select id="opnameBahan" class="w-full px-4 py-3 rounded-2xl bg-slate-800 border border-slate-700"></select>
            <input id="stokFisik" type="number" placeholder="Stok Fisik" class="w-full px-4 py-3 rounded-2xl bg-slate-800 border border-slate-700" />
            <button id="saveOpname" class="w-full py-3 rounded-2xl bg-amber-500 text-slate-950 font-semibold hover:bg-amber-400">Simpan Opname</button>
          </div>
        </div>
        <div class="rounded-3xl bg-slate-900 p-6 shadow-xl border border-slate-700">
          <h2 class="text-2xl font-semibold mb-4">Hasil Opname</h2>
          <div id="opnameList" class="space-y-4"></div>
        </div>
      </section>
    </main>
  </div>
  <script src="assets/app.js"></script>
  <script>
    window.page = 'opname';
    window.addEventListener('DOMContentLoaded', async () => {
      await app.init();
      document.getElementById('logoutBtn').onclick = app.logout;
      const listViewButton = document.getElementById('opnameListView');
      const gridViewButton = document.getElementById('opnameGridView');
      const currentMode = app.loadViewModeFromStorage('opnameList', 'grid');
      app.setViewMode('opnameList', currentMode, [listViewButton, gridViewButton]);
      listViewButton.onclick = () => app.setViewMode('opnameList', 'list', [listViewButton, gridViewButton]);
      gridViewButton.onclick = () => app.setViewMode('opnameList', 'grid', [listViewButton, gridViewButton]);
      const bahan = await app.fetchJson('/api/bahan');
      bahan.forEach((item) => {
        const opt = document.createElement('option');
        opt.value = item.id;
        opt.textContent = `${item.nama} (${item.qty} ${item.satuan})`;
        select.appendChild(opt);
      });
      const loadOpname = async () => {
        const opname = await app.fetchJson('/api/opname');
        const list = document.getElementById('opnameList');
        list.innerHTML = '';
        opname.forEach((row) => {
          const card = document.createElement('div');
          card.className = 'rounded-3xl bg-slate-800 p-5 border border-slate-700';
          card.innerHTML = `<div class="flex justify-between items-center gap-4"><div><h3 class="text-lg font-semibold">${row.nama}</h3><p class="text-slate-400">Sistem: ${row.stok_sistem} ${row.satuan}</p><p class="text-slate-400">Fisik: ${row.stok_fisik} ${row.satuan}</p></div><div class="text-right"><p class="text-slate-300">Selisih: ${row.selisih}</p><p class="text-slate-500 text-sm">${new Date(row.tanggal).toLocaleString()}</p></div></div>`;
          list.appendChild(card);
        });
      };
      document.getElementById('saveOpname').onclick = async () => {
        const bahan_id = Number(select.value);
        const stok_fisik = Number(document.getElementById('stokFisik').value);
        if (!stok_fisik) return;
        await app.fetchJson('/api/opname', { method: 'POST', body: { bahan_id, stok_fisik } });
        document.getElementById('stokFisik').value = '';
        loadOpname();
      };
      loadOpname();
    });
  </script>
</body>
</html>
