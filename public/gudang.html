<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gudang & Stok</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="assets/style.css" />
</head>
<body class="min-h-screen bg-slate-950 text-slate-100">
  <div class="flex min-h-screen">
    <aside class="w-72 bg-slate-900 p-6 flex flex-col gap-6">
      <div>
        <h2 class="text-2xl font-semibold">Yare Cafe</h2>
        <p class="text-slate-400 mt-1">Gudang Stok</p>
      </div>
      <nav class="space-y-3 text-slate-300">
        <a href="/dashboard" data-page="dashboard" class="block px-4 py-3 rounded-2xl hover:bg-slate-800">Dashboard</a>
        <a href="/menu" data-page="menu" class="block px-4 py-3 rounded-2xl hover:bg-slate-800">Menu</a>
        <a href="/transaksi" data-page="transaksi" class="block px-4 py-3 rounded-2xl hover:bg-slate-800">Transaksi</a>
        <a href="/gudang" data-page="gudang" class="block px-4 py-3 rounded-2xl bg-slate-800">Gudang</a>
        <a href="/opname" data-page="opname" class="block px-4 py-3 rounded-2xl hover:bg-slate-800">Stock Opname</a>
      </nav>
      <button id="logoutBtn" class="mt-auto px-4 py-3 rounded-2xl bg-red-500 hover:bg-red-400 text-slate-950 font-semibold">Logout</button>
    </aside>
    <main class="flex-1 p-8 space-y-8">
      <header>
        <h1 class="text-4xl font-semibold">Stok Gudang</h1>
        <p class="text-slate-400">Update stok masuk, keluar, dan minimum.</p>
      </header>
      <section class="grid grid-cols-1 lg:grid-cols-2 gap-6">
        <div class="rounded-3xl bg-slate-900 p-6 shadow-xl border border-slate-700">
          <h2 class="text-2xl font-semibold mb-4">Daftar Bahan</h2>
          <div id="bahanList" class="space-y-4"></div>
        </div>
        <div class="rounded-3xl bg-slate-900 p-6 shadow-xl border border-slate-700">
          <h2 class="text-2xl font-semibold mb-4">Aktivitas Stok</h2>
          <div class="space-y-4">
            <div>
              <label class="block text-slate-400 mb-2">Pilih Bahan</label>
              <select id="stokBahan" class="w-full px-4 py-3 rounded-2xl bg-slate-800 border border-slate-700"></select>
            </div>
            <div class="grid grid-cols-1 gap-4">
              <input id="stokQty" type="number" placeholder="Jumlah" class="w-full px-4 py-3 rounded-2xl bg-slate-800 border border-slate-700" />
              <div>
                <label class="block text-slate-400 mb-2">Tipe</label>
                <select id="stokType" class="w-full px-4 py-3 rounded-2xl bg-slate-800 border border-slate-700">
                  <option value="masuk">Masuk</option>
                  <option value="keluar">Keluar</option>
                </select>
              </div>
              <button id="stokMove" class="w-full py-3 rounded-2xl bg-amber-500 text-slate-950 font-semibold hover:bg-amber-400">Proses Stok</button>
            </div>
          </div>
        </div>
      </section>
    </main>
  </div>
  <script src="assets/app.js"></script>
  <script>
    window.page = 'gudang';
    window.addEventListener('DOMContentLoaded', async () => {
      await app.init();
      document.getElementById('logoutBtn').onclick = app.logout;
      const bahan = await app.fetchJson('/api/bahan');
      const list = document.getElementById('bahanList');
      const select = document.getElementById('stokBahan');
      bahan.forEach((item) => {
        const card = document.createElement('div');
        card.className = 'rounded-3xl bg-slate-800 p-5 border border-slate-700';
        card.innerHTML = `<div class="flex justify-between items-start gap-4"><div><h3 class="text-xl font-semibold">${item.nama}</h3><p class="text-slate-400">Qty: ${item.qty} ${item.satuan}</p><p class="text-slate-500">Min: ${item.minimum}</p></div><button data-id="${item.id}" class="updateBtn px-4 py-2 rounded-2xl bg-blue-500 text-slate-950">Update</button></div>`;
        list.appendChild(card);
        const option = document.createElement('option');
        option.value = item.id;
        option.textContent = `${item.nama} (${item.qty} ${item.satuan})`;
        select.appendChild(option);
      });
      document.querySelectorAll('.updateBtn').forEach((btn) => {
        btn.onclick = async () => {
          const id = btn.dataset.id;
          const qty = prompt('Masukkan stok baru');
          const minimum = prompt('Masukkan minimum baru');
          if (!qty) return;
          await app.fetchJson('/api/stock/update', { method: 'POST', body: { bahan_id: Number(id), qty: Number(qty), minimum: Number(minimum || 0) } });
          window.location.reload();
        };
      });
      document.getElementById('stokMove').onclick = async () => {
        const bahan_id = Number(select.value);
        const qty = Number(document.getElementById('stokQty').value);
        const type = document.getElementById('stokType').value;
        if (!qty || qty <= 0) return;
        await app.fetchJson('/api/stock/move', { method: 'POST', body: { bahan_id, type, qty } });
        window.location.reload();
      };
    });
  </script>
</body>
</html>
